<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark background -->
  <rect width="512" height="512" rx="80" fill="#0f0900"/>
  
  <!-- Top gradient accent bar -->
  <rect x="0" y="0" width="512" height="10" rx="5" fill="url(#gradh)"/>
  <!-- Left gradient accent bar -->
  <rect x="0" y="0" width="10" height="512" rx="5" fill="url(#gradv)"/>
  <!-- Bottom gradient accent bar -->
  <rect x="0" y="502" width="512" height="10" rx="5" fill="url(#gradh)"/>
  <!-- Right gradient accent bar -->
  <rect x="502" y="0" width="10" height="512" rx="5" fill="url(#gradv)"/>

  <defs>
    <linearGradient id="gradh" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFC850"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
    <linearGradient id="gradv" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC850"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
  </defs>

  <!-- NoMi label at top -->
  <text x="256" y="80" font-family="Courier New, monospace" font-size="32" fill="#FFC850" text-anchor="middle" letter-spacing="8">◈ NoMi ◈</text>

  <!-- Guitar emoji centered with plenty of room -->
  <text x="256" y="300" font-size="220" text-anchor="middle" dominant-baseline="middle">🎸</text>

  <!-- On Stage text at bottom -->
  <text x="256" y="430" font-family="Georgia, serif" font-size="64" font-weight="900" fill="#FFF8EE" text-anchor="middle" letter-spacing="-1">On Stage</text>

  <!-- Thin gold line under text -->
  <line x1="80" y1="455" x2="432" y2="455" stroke="url(#gradh)" stroke-width="2"/>
</svg>
