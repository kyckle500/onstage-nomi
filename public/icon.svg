<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark background -->
  <rect width="512" height="512" rx="80" fill="#0f0900"/>
  
  <!-- Border accents -->
  <rect x="0" y="0" width="512" height="10" rx="5" fill="url(#gradh)"/>
  <rect x="0" y="0" width="10" height="512" rx="5" fill="url(#gradv)"/>
  <rect x="0" y="502" width="512" height="10" rx="5" fill="url(#gradh)"/>
  <rect x="502" y="0" width="10" height="512" rx="5" fill="url(#gradv)"/>

  <defs>
    <linearGradient id="gradh" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFC850"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
    <linearGradient id="gradv" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC850"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
  </defs>

  <!-- On Stage at top -->
  <text x="256" y="90" font-family="Georgia, serif" font-size="72" font-weight="900" fill="#FFF8EE" text-anchor="middle" letter-spacing="-1">On Stage</text>

  <!-- Thin gold line under On Stage -->
  <line x1="60" y1="108" x2="452" y2="108" stroke="url(#gradh)" stroke-width="2"/>

  <!-- Guitar truly centered in remaining space between lines -->
  <text x="256" y="310" font-size="200" text-anchor="middle" dominant-baseline="middle">🎸</text>

  <!-- Thin gold line above NoMi -->
  <line x1="60" y1="415" x2="452" y2="415" stroke="url(#gradh)" stroke-width="2"/>

  <!-- NoMi at bottom -->
  <text x="256" y="468" font-family="Courier New, monospace" font-size="36" fill="#FFC850" text-anchor="middle" letter-spacing="8">◈ NoMi ◈</text>
</svg>
