<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark background -->
  <rect width="512" height="512" rx="100" fill="#0f0900"/>
  <!-- Gradient accent bar at top -->
  <rect x="0" y="0" width="512" height="8" rx="4" fill="url(#grad)"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="512" rx="4" fill="url(#gradv)"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFC850"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
    <linearGradient id="gradv" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC850"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
  </defs>
  <!-- Guitar icon centered -->
  <text x="256" y="300" font-size="200" text-anchor="middle" dominant-baseline="middle">🎸</text>
  <!-- On Stage text -->
  <text x="256" y="400" font-family="Georgia, serif" font-size="52" font-weight="900" fill="#FFF8EE" text-anchor="middle" letter-spacing="-1">On Stage</text>
  <!-- NoMi subtitle -->
  <text x="256" y="450" font-family="Courier New, monospace" font-size="28" fill="#FFC850" text-anchor="middle" letter-spacing="6">◈ NoMi ◈</text>
</svg>
